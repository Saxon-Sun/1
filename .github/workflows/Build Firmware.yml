name: Build immortalwrt Firmware

on:
  workflow_dispatch:
    inputs:

      build_x86_1:
        description: '编译 x86 - 93'
        required: false
        type: boolean
        default: true
      build_x86_2:
        description: '编译 x86 - 1102'
        required: false
        type: boolean
        default: false
      build_x86_3:
        description: '编译 x86 - br'
        required: false
        type: boolean
        default: false
      build_n1:
        description: '编译 N1 固件'
        required: false
        type: boolean
        default: false
      ssh:
        description: '开启 SSH 连接 (调试用)'
        required: false
        type: boolean
        default: false
      pure_firmware:
        description: '编译纯净固件 (不注入配置和 public)'
        required: false
        type: boolean
        default: false
      # ----------------------
      branch_25_12:
        description: 'openwrt-25.12'
        required: false
        type: boolean
        default: true
      branch_24_10:
        description: 'openwrt-24.10'
        required: false
        type: boolean
        default: false
        

jobs:
  # =======================================================
  # 初始化矩阵
  # =======================================================
  init:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_target: ${{ steps.set-matrix.outputs.has_target }}
    steps:
      - id: set-matrix
        run: |
          TARGETS=()
          [[ "${{ inputs.build_x86_1 }}" == "true" ]] && TARGETS+=("immortalwrt-x86-93")
          [[ "${{ inputs.build_x86_2 }}" == "true" ]] && TARGETS+=("immortalwrt-x86-1102")
          [[ "${{ inputs.build_x86_3 }}" == "true" ]] && TARGETS+=("br-x86")
          [[ "${{ inputs.build_n1 }}" == "true" ]] && TARGETS+=("immortalwrt-N1")
          
          BRANCHES=()
          [[ "${{ inputs.branch_25_12 }}" == "true" ]] && BRANCHES+=("openwrt-25.12")
          [[ "${{ inputs.branch_24_10 }}" == "true" ]] && BRANCHES+=("openwrt-24.10")
          
          if [ ${#TARGETS[@]} -eq 0 ] || [ ${#BRANCHES[@]} -eq 0 ]; then
             echo "has_target=false" >> $GITHUB_OUTPUT
             echo "⚠️ 未选择任何编译目标或未选择分支"
          else
             # 生成交叉矩阵
             MATRIX_JSON=()
             for t in "${TARGETS[@]}"; do
               for b in "${BRANCHES[@]}"; do
                 MATRIX_JSON+=("{\"target\": \"$t\", \"branch\": \"$b\"}")
               done
             done
             
             JSON_STRING=$(IFS=,; echo "${MATRIX_JSON[*]}")
             echo "matrix={\"include\": [$JSON_STRING]}" >> $GITHUB_OUTPUT
             echo "has_target=true" >> $GITHUB_OUTPUT
             echo "✅ 生成的编译矩阵: [$JSON_STRING]"
          fi

  # =======================================================
  # 统一编译任务 (并行 + 缓存加速)
  # =======================================================
  build:
    name: Build - ${{ matrix.target }} (${{ matrix.branch }})
    needs: init
    if: needs.init.outputs.has_target == 'true'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: write
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}
    env:
      TARGET_Name: ${{ matrix.target }}
      REPO_URL: https://github.com/immortalwrt/immortalwrt
      REPO_BRANCH: ${{ matrix.branch }}
      TZ: Asia/Shanghai

    steps:
    - name: Checkout Private Config Repo
      uses: actions/checkout@v5
      with:
        repository: Saxon-Sun/Route-config-Files
        token: ${{ secrets.pw }}
        path: Route-config-Files
        fetch-depth: 1

    # =======================================================
    # 核心步骤：自动识别架构
    # =======================================================
    - name: Determine Architecture
      id: arch
      run: |
        echo "正在检查目标名称: $TARGET_Name"
        TARGET_LOWER="${TARGET_Name,,}"
        
        if [[ "$TARGET_LOWER" == *"n1"* ]]; then
            echo "BUILD_TYPE=n1" >> $GITHUB_ENV
            echo "✅ 识别为 N1 架构"
        elif [[ "$TARGET_LOWER" == *"x86"* ]]; then
            echo "BUILD_TYPE=x86" >> $GITHUB_ENV
            echo "✅ 识别为 x86 架构"
        else
            echo "❌ 致命错误：无法从 '$TARGET_Name' 中识别架构！"
            echo "请确保 Target 名称包含 'x86' 或 'n1'。"
            exit 1
        fi

    - name: Maximize Build Space
      uses: coder-xiaomo/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 创建模拟物理磁盘 (LVM)
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mkdir -p /github-builder
        sudo mount /dev/github/runner /github-builder
        sudo chown -R $USER:$GROUPS /github-builder
        df -Th

    - name: Initialize Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo timedatectl set-timezone $TZ
        sudo apt-get update && sudo apt-get install -y ccache

    - name: Clone Source Code
      working-directory: /github-builder
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /github-builder/openwrt $GITHUB_WORKSPACE/openwrt

    # =======================================================
    # 缓存机制 : 使用 env.BUILD_TYPE 和 REPO_BRANCH 作为 Key
    # =======================================================
    - name: Restore Ccache
      uses: actions/cache/restore@v4
      with:
        path: /github-builder/openwrt/.ccache
        key: ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-${{ env.REPO_BRANCH }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-${{ env.REPO_BRANCH }}-
          ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-

    - name: Configure Feeds & Apply Custom Configuration
      working-directory: /github-builder/openwrt
      run: |
        echo "正在导入私有配置..."
        cp -r $GITHUB_WORKSPACE/Route-config-Files .
        ls -R Route-config-Files | head -n 5
        chmod +x Route-config-Files/diy/*.sh
        mv Route-config-Files/diy/*.sh .
        
        echo "正在更新并安装Feeds..."
        ./Add-Source.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        echo "正在应用自定义配置"
        ./diy.sh $TARGET_Name ${{ inputs.pure_firmware }}
        make defconfig

    - name: Connect to Tailscale
      if: inputs.ssh == true
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci
        args: --ssh

    - name: Send SSH Info Notification and Wait
      if: inputs.ssh == true
      working-directory: /github-builder/openwrt
      run: |
        ./ssh_notify.sh "${{ matrix.target }}"

    - name: Download Dependencies
      working-directory: /github-builder/openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      working-directory: /github-builder/openwrt
      id: compile
      run: |
        export CCACHE_DIR=$(pwd)/.ccache
        mkdir -p "$CCACHE_DIR"
        
        ccache -M 2G -F 0
        echo "====== Ccache 初始状态 ======"
        ccache -s
        echo "============================="
        
        echo "开始编译..."
        if ! make -j$(nproc); then
            echo "❌ 多线程编译失败，显示磁盘使用情况..."
            df -h
            echo "尝试单线程并输出日志..."
            make -j1 V=s
        fi
        echo "✅ 编译流程结束"
        
        echo "====== 编译后 Ccache 统计 ======"
        ccache -s
        echo "================================"
        
        echo "显示磁盘使用情况..."
        df -h
        rm -rf build_dir
        rm -rf $(find ./bin/targets/ -type d -name "packages")
        find ./bin/targets/ -type f -name "*squashfs-rootfs*" -exec echo "🗑️  删除文件: {}" \; -delete
        ls -la "$GITHUB_WORKSPACE"/openwrt/bin/targets/*/*/*
        
        if [ -n "$(find bin/targets/ -name '*.tar.gz' -o -name '*.img*')" ]; then
             echo "status=success" >> $GITHUB_OUTPUT
        else
             echo "⚠️ 未检测到固件产物，可能编译失败"
        fi

    # ==========================================
    # N1 特有步骤: 打包 Armvirt 为 OpenWrt
    # ==========================================
    - name: Package Armvirt as OpenWrt (N1 Only)
      if: steps.compile.outputs.status == 'success' && env.BUILD_TYPE == 'n1' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/*.tar.gz
        PACKAGE_SOC: s905d
        KERNEL_VERSION_NAME: 6.12.y
        WHOAMI: Saxon

    # ==========================================
    # 处理 Artifacts 和上传
    # ==========================================
    - name: Prepare Artifacts
      working-directory: /github-builder/openwrt
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p artifact/{firmware,package}
        
        if [ "$BUILD_TYPE" == "n1" ]; then
          # N1 处理逻辑
          ls -lh /opt/openwrt_packit/output
          find /opt/openwrt_packit/output -type f -exec cp -f {} artifact/firmware/ \;
        else
          # x86 处理逻辑
          find bin/targets/ -type f -exec cp -f {} artifact/firmware/ \;
          find bin/packages/ -type f -name "*.ipk" -exec cp -f {} artifact/package/ \;
        fi

    - name: Upload Firmware via Script
      working-directory: /github-builder/openwrt
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        ./upload.sh $TARGET_Name ${{ inputs.pure_firmware }}
        
    - name: Delete Old Caches
      if: steps.compile.outputs.status == 'success' && !cancelled() && (env.BUILD_TYPE == 'n1' || matrix.target == 'immortalwrt-x86-93')
      uses: actions/github-script@v7
      with:
        script: |
          const buildType = process.env.BUILD_TYPE;
          const repoBranch = process.env.REPO_BRANCH;
          
          console.log(`🔍 [管理员模式] 正在清理 ${buildType} 架构旧缓存...`);
          const key_prefix = `${{ runner.os }}-ccache-${buildType}-${repoBranch}-`;
          try {
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              key: key_prefix,
              ref: context.ref,
            });
            for (const cache of caches.data.actions_caches) {
              console.log(`🗑️  删除旧缓存 ID: ${cache.id} Key: ${cache.key}`);
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
            }
          } catch (error) {
            console.log(`⚠️  清理失败: ${error.message}`);
          }

    - name: Save Ccache
      if: steps.compile.outputs.status == 'success' && !cancelled() && (env.BUILD_TYPE == 'n1' || matrix.target == 'immortalwrt-x86-93')
      uses: actions/cache/save@v4
      with:
        path: /github-builder/openwrt/.ccache
        key: ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-${{ env.REPO_BRANCH }}-${{ github.run_id }}
        
  # =======================================================
  # 清理历史记录
  # =======================================================
  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
    - name: Cleanup Workflow Runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.pw }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 2